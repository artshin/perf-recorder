name: Release

# Push to main keeps the "Version Packages" PR up to date (versioning only).
# Publishing to npm happens ONLY via a manual run (workflow_dispatch) so a
# release is always a deliberate act.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Version PR or Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the "Version Packages" PR + git tags
      pull-requests: write # open/update the Version PR
      id-token: write # npm OIDC trusted publishing + provenance
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn
          registry-url: https://registry.npmjs.org

      # Trusted publishing (OIDC) requires a recent npm CLI.
      - name: Update npm
        run: npm install -g npm@latest

      - name: Install
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build

      - name: Create Version PR or publish
        uses: changesets/action@v1
        with:
          version: yarn version-packages
          # Empty on push (version-PR only); set only on a manual run so
          # npm publish never fires automatically.
          publish: ${{ github.event_name == 'workflow_dispatch' && 'yarn release' || '' }}
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
